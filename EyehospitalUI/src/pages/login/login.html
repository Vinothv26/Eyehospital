<div class="login-container">

  <!-- Floating Notification Toast -->
  @if (showError) {
    <div class="notification-toast">
      <div class="toast-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <div class="toast-content">
        <div class="toast-title">Login Error</div>
        <div class="toast-message">{{ errorMessage }}</div>
      </div>
      <button class="toast-close" (click)="showError = false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  }

  <div class="login-card">

    <!-- Brand Section -->
    <div class="login-brand-section">
      <div class="brand-logo">
        
      </div>
      <h1 class="brand-title">Medical Record System</h1>
    </div>

    <!-- Login Form Section -->
    <div class="login-form-section">
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Sign in to your account</p>


      <form #loginForm="ngForm" class="login-form">

        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input 
              type="text" 
              id="username"
              class="form-control" 
              name="username"
              [(ngModel)]="loginobj.username"
              placeholder="Enter your username"
              required
              autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input 
              type="password" 
              id="password"
              class="form-control" 
              name="password"
              [(ngModel)]="loginobj.password"
              placeholder="Enter your password"
              required
              autocomplete="current-password">
          </div>
        </div>

        <button 
          (click)="onlogin()" 
          class="login-btn" 
          type="submit"
          [disabled]="loading">
          @if (loading) {
            <span class="spinner"></span>
            <span>Signing in...</span>
          } @else {
            Sign In
          }
        </button>

      </form>

      <div class="login-footer">
        <p>&copy; 2026 All rights reserved.</p>
      </div>
    </div>

  </div>

</div>
